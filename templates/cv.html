{% extends "base.html" %}

{% block head_extra %}
<style>
.pdf-wrapper{width:100%;height:80vh;border-radius:.4rem;overflow:hidden;border:1px solid var(--border,#e0d9ce)}
.pdf-wrapper iframe{width:100%;height:100%;border:0;display:block}
</style>
{% endblock head_extra %}

{% block content %}
<h1>{{ page.title }}</h1>
{% if page.extra.pdf_path %}
<div class="pdf-wrapper">
  <iframe src="{{ page.extra.pdf_path }}" title="{{ page.title }}"></iframe>
</div>
{% endif %}
{{ page.content | safe }}
{% endblock content %}
