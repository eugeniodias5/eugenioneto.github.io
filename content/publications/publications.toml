[[publications]]
title = "Background-invariant re-identification of dogs from camera-trap videos in non-controlled environments"
emoji = "🐕"
authors = ["EDR Neto", "C Barrelet", "M Chaumont", "G Subsol", "MNF Mahfudz", "MNAPR Bone", "BS Widartono", "H Wijayanto", "DA Widiasih", "MN Farida", "WT Artama", "T Langlois", "H Guis", "E Loire", "M de Garine-Wichatitsky"]
venue = "Ecological Informatics"
date = "2025"
acceptance_rate = "Impact factor: 7.3"
description = "We propose BIFOR (Background Invariant Feature extractOR), a training strategy designed to reduce background influence for generalizable dog Re-ID. BIFOR achieves state-of-the-art cross-domain performance. <br> We released two datasets that are, to date, the largest dog re-identification datasets in literature: the YT-BB-Dog that contains more than 2,700 dogs, and the Sibetan dataset, the first long-term dog re-identification dataset featuring 59 dogs and one week of cross-camera recordings. <br> Paper, datasets, and code implementation are available below."
media = "bifor_pipeline.png"
urls = [
  { name = "Paper", url = "https://www.sciencedirect.com/science/article/pii/S1574954125005564" },
  { name = "Datasets", url = "https://www.lirmm.fr/YT-BB-Dog_Sibetan/" },
  { name = "Code", url = "https://github.com/eugeniodias5/BIFOR/tree/main" },
]
tags = []

