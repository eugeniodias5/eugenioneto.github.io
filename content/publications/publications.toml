[[publications]]
title = "SEAdogSEA-Indonesia: A long-term dog re-identification dataset and benchmark"
emoji = "⏳"
venue = "In preparation..."
description = "Introducing the largest long-term dog re-identification dataset, comprising camera-trap images spanning four years of capture in Indonesia. Furthermore, the dataset has the highest metadata variability among existing animal re-identification datasets. We introduce a rigorous new benchmark designed to evaluate model generalization across both diverse scenarios and across temporal changes."

