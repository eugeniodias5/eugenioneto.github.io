# Site title.
title = "Eugênio Dias Ribeiro Neto"
description = "Eugênio's personal website to present his work, updates, and eternal learning path."
# Base URL for your site.
base_url = "https://eugenioneto.github.io/"
theme = "austere"
# No SASS - CSS is internal (located in base.html template).
compile_sass = false
# Search index enabled.
build_search_index = true
# Default site language.
default_language = "en"
# Feeds.
generate_feeds = true
# Specify feed filenames.
feed_filenames = ["atom.xml", "rss.xml"]
# Taxonomies.
taxonomies = [{ name = "tags", feed = true }]

[search]
# Required for search page to work.
index_format = "fuse_javascript"

[markdown]
# Required for code highlighting blocks.

[slugify]
# Controls slugification for page/section URLs.
paths = "on"
# Controls slugification for taxonomy terms (tags, categories, etc.).
taxonomies = "on"
# Controls slugification for heading anchors (H1 to H6 etc.).
anchors = "on"

[extra]
# Keywords for SEO.
keywords = "zola, theme, minimal"
# Site icon in header (optional - comment out to hide).
site_icon = "quill.svg"
# Header strapline (optional - comment out to hide).

# Footer text (optional - comment out to hide).
footer_text = "This website was built by me using zola and the <a href='https://github.com/tomwrw/austere-theme-zola'>austere</a> theme"
# Favicon (optional - comment out to hide).
favicon = "/favicon.ico"
# Profile picture on home page (optional - comment out to hide).
profile_picture = "/images/home.jpeg"

# Social media links (optional - comment out to hide).
social_links = [
  { name = "GitHub", url = "https://github.com/eugeniodias5", svg = "github.svg" },
  { name = "LinkedIn", url = "https://www.linkedin.com/in/eugeniodias5/", svg = "linkedin.svg" },
  { name = "Scholar", url = "https://scholar.google.fr/citations?user=FQHixj4AAAAJ&hl", svg = "scholar.svg" },
  { name = "Orcid", url = "https://orcid.org/0009-0001-3218-4516", svg = "orcid.svg" },
]

# Enable inline SVG icons (uses sprite sheet)
inline_icons = true
icon_path = "static/icons/"
icons = ["light", "asleep", "rss"]

# Responsive images
image_format = "auto"
image_quality = 80
images_default_size = 1024
images_sizes = [512, 1024, 2048]

# Navigation menu.
menu_links = [
  { url = "$BASE_URL/", name = "Home" },
  { url = "$BASE_URL/resume/", name = "Resume" },
  { url = "$BASE_URL/thesis/", name = "Thesis" },
  { url = "$BASE_URL/publications/", name = "Publications" },
  { url = "$BASE_URL/projects/", name = "Projects" },
]

# Custom colour themes. Adjust here to apply own colour.
# Light colours.
[extra.colours.light]
background = "#FAF7F2"
text = "#1a1a1a"
text_muted = "#3a3a3a"
accent = "#9E4440"
accent_hover = "#7A3533"
code_bg = "#f0ebe3"
border = "#e0d9ce"
# Dark colours.
[extra.colours.dark]
background = "#141413"
text = "#e8e8e8"
text_muted = "#a0a0a0"
accent = "#E07A5F"
accent_hover = "#F4A594"
code_bg = "#1e1e1d"
border = "#2a2a29"
